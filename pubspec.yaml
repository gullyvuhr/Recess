name: recess
description: An offline-first app for taking intentional breaks during the workday.
publish_to: none
version: 1.7.0-beta.3+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.22.1
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  flutter_timezone: ^5.1.0
  go_router: ^14.6.2
  path: ^1.9.1
  path_provider: ^2.1.5
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/exercises.json
    - assets/sounds/
